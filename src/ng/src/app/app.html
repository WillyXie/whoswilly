<!-- Header -->
<header class="bg-white shadow-sm py-4 px-6 md:px-12 fixed w-full z-50 top-0">
  <div class="container mx-auto flex justify-between items-center">
    <!-- Logo -->
    <!--<a href="#" class="text-2xl font-bold text-indigo-600">Hi there!! 🎉</a>-->
    <p class="text-2xl font-bold text-indigo-600">Hi there!! 🎉</p>

    <div class="flex">
      <nav class="hidden md:flex space-x-8">
        @for (item of mainContents; track item.title) {
          <button
            class="text-gray-600 hover:text-indigo-600 font-medium transition-colors duration-200 rounded-md py-2 px-3"
            (click)="switchComponent(item.componentString);"
          >
          <span>{{ item.title }}</span>
          </button>
        }
      </nav>

      <!-- Right Sidebar Toggle Button -->
      <button class="text-gray-600 hover:text-indigo-600 focus:outline-none lg:block" id="right-sidebar-toggle">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="divider" role="separator" aria-label="Divider"></div>

<!-- Main -->
<main>
  <ng-container
    *ngComponentOutlet="curComponentType;"
  ></ng-container>
</main>

<!-- Footer -->
<footer id="footer-section" class="bg-gray-900 text-gray-300 py-10">
  <div class="container mx-auto px-6 text-center">
    <p>&copy; 2025 Willy Xie. All rights reserved.</p>
