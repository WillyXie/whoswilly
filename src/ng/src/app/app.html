<!-- Header -->
<header class="bg-white shadow-sm py-4 px-6 md:px-12 fixed w-full z-50 top-0 border-b border-gray-100">
  <div class="container mx-auto flex justify-between items-center">
    <!-- Logo -->
    <p class="text-xl md:text-2xl font-bold text-indigo-600">Hi there!! 🎉</p>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex space-x-8">
      <a class="main-nav" routerLink="/home" routerLinkActive="text-indigo-600">HOME</a>
      <a class="main-nav" routerLink="/resume" routerLinkActive="text-indigo-600">RESUME</a>
      <a class="main-nav" routerLink="/notes" routerLinkActive="text-indigo-600">NOTES</a>
      <a class="main-nav" routerLink="/projects" routerLinkActive="text-indigo-600">PROJECTS</a>
      <a class="main-nav" routerLink="/trips" routerLinkActive="text-indigo-600">TRIPS</a>
    </nav>

    <!-- Mobile Hamburger Button -->
    <button 
      class="md:hidden text-gray-600 hover:text-indigo-600 focus:outline-none"
      (click)="toggleMobileMenu()"
      aria-label="Toggle menu"
    >
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path *ngIf="!isMobileMenuOpen()" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        <path *ngIf="isMobileMenuOpen()" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div 
    *ngIf="isMobileMenuOpen()" 
    class="md:hidden absolute top-full left-0 w-full bg-white shadow-lg border-b border-gray-100 py-4 px-6 flex flex-col space-y-4"
  >
    <a class="main-nav py-2" routerLink="/home" routerLinkActive="text-indigo-600" (click)="closeMobileMenu()">HOME</a>
    <a class="main-nav py-2" routerLink="/resume" routerLinkActive="text-indigo-600" (click)="closeMobileMenu()">RESUME</a>
    <a class="main-nav py-2" routerLink="/notes" routerLinkActive="text-indigo-600" (click)="closeMobileMenu()">NOTES</a>
    <a class="main-nav py-2" routerLink="/projects" routerLinkActive="text-indigo-600" (click)="closeMobileMenu()">PROJECTS</a>
    <a class="main-nav py-2" routerLink="/trips" routerLinkActive="text-indigo-600" (click)="closeMobileMenu()">TRIPS</a>
  </div>
</header>

<div class="divider" role="separator" aria-label="Divider"></div>

<!-- Main -->
<main>
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer id="footer-section" class="bg-gray-900 text-gray-300 py-10">
  <div class="container mx-auto px-6 text-center">
    <p>&copy; 2025 Willy Xie. All rights reserved.</p>
  </div>
</footer>
